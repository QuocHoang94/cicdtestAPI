name: Playwright API Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOG_API_KEY: ${{ secrets.DOG_API_KEY }}
      DOG_API_ENDPOINT: ${{ vars.DOG_API_ENDPOINT || 'https://api.thedogapi.com/v1/breeds' }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required environment variables
        run: |
          # If the secret is missing, fail only on non-PR runs. For pull requests
          # (often from forks) we warn and skip to avoid failing CI for external
          # contributors who cannot set repo secrets.
          if [ -z "$DOG_API_KEY" ]; then
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
              echo "Warning: DOG_API_KEY is not set. Skipping tests for pull requests."
              exit 0
            else
              echo "DOG_API_KEY secret is required to run the test suite in CI."
              exit 1
            fi
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright API tests
        run: npx playwright test

      - name: Generate Allure report
        if: always()
        run: |
          # Generate Allure HTML report from results (if any)
          if [ -d "allure-results" ]; then
            npx allure-commandline generate allure-results -o allure-report --clean || echo "Allure generation failed"
          else
            echo "No allure-results directory found; skipping generation"
          fi

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright raw test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

